name: Test feed pipeline

on:
  pull_request:
    paths:
      - "scripts/update_feed.py"
      - "Tests/python/**"
      - ".github/workflows/test-feed-pipeline.yml"
  push:
    branches: [main]
    paths:
      - "scripts/update_feed.py"
      - "Tests/python/**"
      - ".github/workflows/test-feed-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run offline pipeline contracts
        run: python -m unittest discover -s Tests/python -p "test_*.py" -v
