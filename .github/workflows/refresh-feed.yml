name: Refresh independent AI feed

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: refresh-independent-ai-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore unfinished editorial draft
        id: restore-editorial-draft
        uses: actions/cache/restore@v4
        with:
          path: Data/news.draft.json
          key: editorial-draft-${{ hashFiles('Data/news.json', 'Data/source-feeds.json', 'scripts/update_feed.py') }}-${{ github.run_id }}
          restore-keys: |
            editorial-draft-${{ hashFiles('Data/news.json', 'Data/source-feeds.json', 'scripts/update_feed.py') }}-
      - name: Collect official feeds
        shell: bash
        run: |
          if [[ -f Data/news.draft.json ]]; then
            echo "Resuming the most recent unfinished editorial draft."
            python scripts/update_feed.py --config Data/source-feeds.json --output Data/news.json --repair-draft || {
              echo "Cached draft is no longer reusable; starting a fresh incremental run."
              rm -f Data/news.draft.json
              python scripts/update_feed.py --config Data/source-feeds.json --output Data/news.json
            }
          else
            python scripts/update_feed.py --config Data/source-feeds.json --output Data/news.json
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_PROVIDER_POOL_JSON: ${{ secrets.AI_PROVIDER_POOL_JSON }}
          AI_API_KEY: ${{ secrets.AI_API_KEY || github.token }}
          AI_API_BASE: ${{ vars.AI_API_BASE || 'https://models.github.ai/inference' }}
          AI_MODEL: ${{ vars.AI_MODEL || 'openai/gpt-4.1' }}
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
          AI_REVIEW_API_BASE: ${{ vars.AI_REVIEW_API_BASE }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL || vars.AI_MODEL || 'openai/gpt-4.1' }}
      - name: Save unfinished editorial draft
        if: always() && hashFiles('Data/news.draft.json') != ''
        uses: actions/cache/save@v4
        with:
          path: Data/news.draft.json
          key: editorial-draft-${{ hashFiles('Data/news.json', 'Data/source-feeds.json', 'scripts/update_feed.py') }}-${{ github.run_id }}
      - name: Validate schema and publication gates
        shell: bash
        run: |
          if git diff --quiet -- Data/news.json; then
            echo "No new qualified articles; validating the retained edition."
            python scripts/validate_release.py --news Data/news.json --project AIFrontier.csproj
          else
            python scripts/validate_release.py --news Data/news.json --project AIFrontier.csproj --max-age-hours 24
          fi
      - name: Commit changed feed
        run: |
          git config user.name "ai-frontier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Data/news.json
          if git diff --cached --quiet; then
            echo "Qualified edition is unchanged."
            exit 0
          fi
          git commit -m "chore: refresh independent AI feed"
          git push || {
            echo "Main moved during collection; rebasing once before the final push."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          }
