name: Build Windows installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v (must match AIFrontier.csproj)
        required: true
        type: string
      publish:
        description: Publish a GitHub Release after all release gates pass
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: protected-ai-frontier-release
  cancel-in-progress: false

jobs:
  verify-and-build:
    name: Verify and build installer
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
              throw "Release tags must use the exact form vMAJOR.MINOR.PATCH."
            }
            $version = $tag.Substring(1)
          } else {
            $version = "${{ inputs.version }}".Trim()
            if ($version -notmatch '^\d+\.\d+\.\d+$') {
              throw "The manual version must use the exact form MAJOR.MINOR.PATCH."
            }
            $tag = "v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore production app and integration fixture
        shell: pwsh
        run: |
          dotnet restore AIFrontier.csproj -p:NuGetAudit=false
          dotnet restore Tests\AIFrontier.ReaderV2.IntegrationTests.csproj -p:NuGetAudit=false

      - name: Build production app
        shell: pwsh
        run: dotnet build AIFrontier.csproj -c Release --no-restore -p:NuGetAudit=false

      - name: Run reader integration fixture
        shell: pwsh
        run: dotnet run --project Tests\AIFrontier.ReaderV2.IntegrationTests.csproj -c Release --no-restore -p:NuGetAudit=false

      - name: Validate schema v2 content and version consistency
        shell: pwsh
        run: python scripts\validate_release.py --news Data\news.json --project AIFrontier.csproj --version "${{ steps.metadata.outputs.version }}" --max-age-hours 72

      - name: Publish self-contained app
        shell: pwsh
        run: |
          dotnet publish AIFrontier.csproj -c Release -r win-x64 --self-contained true --no-restore `
            -p:Platform=x64 `
            -p:Version="${{ steps.metadata.outputs.version }}" `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            -p:NuGetAudit=false `
            -o dist

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build one-click installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.metadata.outputs.version }}" `
            "/DPublishDir=$pwd\dist" `
            installer\AIFrontier.iss
          $hash = (Get-FileHash installer\output\AIFrontier-Setup.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  AIFrontier-Setup.exe" | Set-Content installer\output\AIFrontier-Setup.exe.sha256 -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: AIFrontier-Windows-${{ steps.metadata.outputs.version }}
          path: |
            installer/output/AIFrontier-Setup.exe
            installer/output/AIFrontier-Setup.exe.sha256
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish protected GitHub Release
    needs: verify-and-build
    if: >-
      vars.RELEASES_ENABLED == 'true' &&
      (github.ref_type == 'tag' ||
       (github.event_name == 'workflow_dispatch' && inputs.publish == true))
    runs-on: windows-latest
    timeout-minutes: 20
    environment: production-release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AIFrontier-Windows-${{ needs.verify-and-build.outputs.version }}
          path: release-assets

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.verify-and-build.outputs.tag }}" `
            release-assets\AIFrontier-Setup.exe `
            release-assets\AIFrontier-Setup.exe.sha256 `
            --target "${{ github.sha }}" `
            --generate-notes
